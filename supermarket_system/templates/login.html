<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="height:100vh;">
  <div class="card p-4" style="width:360px;">
    <h5 class="mb-3">Employee Login</h5>
    <form id="loginForm">
      <div class="mb-2"><input class="form-control" id="username" placeholder="Username" required></div>
      <div class="mb-2"><input class="form-control" id="password" type="password" placeholder="Password" required></div>
      <div class="d-grid">
        <button class="btn btn-primary" type="submit">Login</button>
      </div>
    </form>
    <div id="loginAlert" class="mt-3"></div>
  </div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const res = await fetch('/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  if (!data.success) {
    document.getElementById('loginAlert').innerHTML = `<div class="alert alert-danger">${data.error || 'Login failed'}</div>`;
    return;
  }
  window.location = '/';
});
</script>
</body>
</html>
