{% extends "base.html" %}

{% block title %}Employee Management{% endblock %}

{% block content %}
<div class="container p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Employees</h1>
        <button class="btn btn-primary" onclick="openEmployeeModal()">Add Employee</button>
    </div>

    <div id="employeeAlert"></div>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Username</th>
                <th>Full Name</th>
                <th>Role</th>
                <th>Email</th>
                <th>Active</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="employeesTableBody"></tbody>
    </table>
</div>

<div class="modal fade" id="employeeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Employee</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="employeeForm">
          <input type="hidden" id="empId">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input id="empUsername" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input id="empPassword" type="password" class="form-control">
            <div class="form-text">Leave blank when editing to keep the current password.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Full name</label>
            <input id="empFullName" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="empEmail" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input id="empPhone" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select id="empRole" class="form-select"></select>
          </div>
          <div class="form-check">
            <input id="empActive" type="checkbox" class="form-check-input" checked>
            <label class="form-check-label" for="empActive">Active</label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveEmployee()">Save</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/employees.js') }}"></script>
{% endblock %}
